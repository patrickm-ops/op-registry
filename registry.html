a{text-decoration:none}
button{cursor:pointer;font-family:'Outfit',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.hero{position:relative;background:linear-gradient(170deg,#2C3315 0%,#5B6E2E 45%,#7A8B47 100%);padding:56px 24px 48px;text-align:center;overflow:hidden}
.hero-grain{position:absolute;inset:0;background:radial-gradient(ellipse at 25% 15%,rgba(255,255,255,0.05) 0%,transparent 55%);pointer-events:none}
.hero-inner{position:relative;z-index:1;max-width:560px;margin:0 auto}
.leaf-row{display:flex;justify-content:center;gap:12px;margin-bottom:16px;font-size:20px}
.leaf-row span{opacity:0.35}
.hero-sub{font-size:10px;letter-spacing:0.3em;color:rgba(255,255,255,0.5);margin-bottom:8px;font-weight:500}
.hero-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(38px,9vw,60px);font-weight:300;color:#fff;margin:0 0 4px;line-height:1.1}
.hero-title .amp{font-style:italic;color:#E8DCC8}
.divider{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0}
.div-line{display:block;width:44px;height:1px;background:rgba(255,255,255,0.2)}
.div-dot{color:#E8DCC8;font-size:9px}
.hero-date{font-size:13px;color:rgba(255,255,255,0.8);letter-spacing:0.06em;margin-bottom:2px}
.hero-venue{font-size:12px;color:rgba(255,255,255,0.55);letter-spacing:0.04em;margin-bottom:20px;font-style:italic}
.hero-msg{font-size:13.5px;line-height:1.75;color:rgba(255,255,255,0.65);max-width:460px;margin:0 auto;font-weight:300}

.prog-wrap{max-width:460px;margin:0 auto;padding:24px 24px 8px;text-align:center}
.prog-outer{height:5px;background:#E8DCC8;border-radius:3px;overflow:hidden}
.prog-inner{height:100%;background:linear-gradient(90deg,#5B6E2E,#7A8B47);border-radius:3px;transition:width 0.5s ease}
.prog-label{font-size:11px;color:#5B6E2E;margin-top:8px;letter-spacing:0.06em;font-weight:500}

.filters{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:14px 20px 20px;max-width:780px;margin:0 auto}
.f-btn{font-size:12px;padding:6px 14px;border:1px solid #E8DCC8;border-radius:20px;background:transparent;color:#3D3D3D;transition:all 0.15s ease;display:flex;align-items:center}
.f-btn.on{background:#5B6E2E;color:#fff;border-color:#5B6E2E}
.f-btn .cnt{font-size:10px;color:#aaa;margin-left:3px}
.f-btn.on .cnt{color:rgba(255,255,255,0.7)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;padding:0 20px 40px;max-width:1080px;margin:0 auto}
.card{background:#fff;border-radius:14px;padding:0 0 20px;position:relative;border:1px solid #EDE8DF;display:flex;flex-direction:column;animation:fadeUp 0.35s ease both;overflow:hidden}
.card.done{opacity:0.6;background:#FCFCF8}
.badge{position:absolute;top:14px;right:14px;font-size:10px;font-weight:500;color:#C4956A;background:#FEF8F0;padding:3px 10px;border-radius:10px;border:1px solid rgba(196,149,106,0.19);z-index:2}
.card-img-wrap{width:100%;height:200px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#F8F6F2;border-bottom:1px solid #F0ECE4}
.card-img{max-width:100%;max-height:100%;object-fit:contain;padding:16px}
.card-cat{font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#7A8B47;padding:14px 22px 0}
.card-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:21px;font-weight:500;color:#2C3315;margin:4px 22px 6px;line-height:1.25}
.card-name a:hover{text-decoration:underline}
.card-img-wrap:hover{opacity:0.85;transition:opacity 0.15s}
[contenteditable="true"]{outline:none;border-bottom:1px dashed #5B6E2E40;cursor:text;transition:border-color 0.2s}
[contenteditable="true"]:hover{border-bottom-color:#5B6E2E}
[contenteditable="true"]:focus{border-bottom:2px solid #5B6E2E;background:rgba(91,110,46,0.04);border-radius:3px}
.edit-hint{display:none;font-size:9px;color:#5B6E2E;opacity:0.6;margin-left:4px}
.admin-active .edit-hint{display:inline}
.card-desc{font-size:13px;line-height:1.65;color:#777;margin:0 22px 12px;font-weight:300;flex:1}
.meta{display:flex;flex-direction:column;gap:6px;margin:0 22px 14px;padding:12px 0;border-top:1px solid #F0ECE4}
.meta-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.meta-k{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#bbb;flex-shrink:0}
.meta-v{font-size:12px;color:#3D3D3D;text-align:right;font-weight:300}
.meta-p{font-size:13px;color:#5B6E2E;font-weight:500}

.links-area{margin:0 22px 14px}
.links-btn{font-size:12px;color:#5B6E2E;background:none;border:none;padding:4px 0;font-weight:500;display:flex;align-items:center;gap:4px}
.links-arr{font-size:12px;transition:transform 0.2s ease;display:inline-block}
.links-arr.open{transform:rotate(180deg)}
.links-list{display:none;flex-direction:column;gap:4px;margin-top:8px}
.links-list.open{display:flex}
.link-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#F8F6F0;border-radius:8px;color:#3D3D3D;font-size:12px;border:1px solid #EFEBE3;text-decoration:none}
.link-row:hover{background:#F0ECE4}
.link-go{color:#5B6E2E;font-weight:600;font-size:13px;margin-left:8px}

.claimed-box{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(91,110,46,0.05);border-radius:8px;font-size:13px;color:#5B6E2E;margin:0 22px}
.claimed-ico{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#5B6E2E;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.claim-form{display:none;flex-direction:column;gap:8px;margin:0 22px}
.claim-form.open{display:flex}
.claim-input{font-family:'Outfit',sans-serif;font-size:14px;padding:10px 14px;border:2px solid #5B6E2E;border-radius:8px;outline:none;color:#3D3D3D}
.claim-btns{display:flex;gap:8px}
.confirm-btn{flex:1;padding:10px;background:#5B6E2E;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500}
.confirm-btn:disabled{opacity:0.5}
.cancel-btn{padding:10px 14px;background:transparent;color:#aaa;border:1px solid #ddd;border-radius:8px;font-size:13px}
.main-btn{width:calc(100% - 44px);margin:0 22px;padding:12px;background:#5B6E2E;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;letter-spacing:0.02em;transition:background 0.15s ease}
.main-btn:hover{background:#4A5D24}

.footer{text-align:center;padding:16px 24px 48px;max-width:480px;margin:0 auto}
.footer-love{font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;color:#5B6E2E;margin-top:20px;font-weight:300;font-style:italic}
.footer-note{font-size:13px;color:#aaa;line-height:1.65;margin-top:8px;font-weight:300}

.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;top:-5%;animation:confettiFall 3s ease-out forwards}

/* ── Admin Panel ── */
.admin-toggle{position:fixed;bottom:20px;right:20px;z-index:1000;background:#5B6E2E;color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:20px;box-shadow:0 2px 12px rgba(0,0,0,0.2);display:none}
.admin-toggle.show{display:block}
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1001}
.admin-overlay.open{display:block}
.admin-panel{display:none;position:fixed;top:0;right:0;bottom:0;width:420px;max-width:90vw;background:#fff;z-index:1002;box-shadow:-4px 0 24px rgba(0,0,0,0.15);overflow-y:auto;padding:24px}
.admin-panel.open{display:block}
.admin-panel h2{font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;color:#2C3315;margin-bottom:4px}
.admin-panel .admin-sub{font-size:12px;color:#999;margin-bottom:20px}
.admin-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;color:#aaa}
.admin-section{margin-bottom:24px}
.admin-section h3{font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#5B6E2E;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #F0ECE4}
.admin-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#FAFAF5;border:1px solid #EDE8DF;border-radius:8px;margin-bottom:6px;font-size:13px}
.admin-item img{width:40px;height:40px;object-fit:contain;border-radius:4px;background:#fff}
.admin-item-info{flex:1;min-width:0}
.admin-item-name{font-weight:500;color:#2C3315;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-item-cat{font-size:10px;color:#999}
.admin-arrows{display:flex;flex-direction:column;gap:2px}
.admin-arrows button{background:#E8DCC8;border:none;border-radius:4px;width:24px;height:20px;font-size:10px;color:#5B6E2E;font-weight:700;transition:background 0.15s}
.admin-arrows button:hover{background:#5B6E2E;color:#fff}
.admin-arrows button:disabled{opacity:0.3;cursor:default;background:#E8DCC8;color:#5B6E2E}
.admin-edit-btn{background:none;border:1px solid #E8DCC8;border-radius:4px;padding:4px 8px;font-size:10px;color:#5B6E2E;white-space:nowrap}
.admin-edit-btn:hover{background:#5B6E2E;color:#fff}

.admin-filter-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.admin-filter-bar button{font-size:11px;padding:4px 10px;border:1px solid #E8DCC8;border-radius:14px;background:transparent;color:#3D3D3D}
.admin-filter-bar button.on{background:#5B6E2E;color:#fff;border-color:#5B6E2E}

.admin-actions{display:flex;gap:8px;margin-bottom:16px}
.admin-actions button{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:500;border:none}
.admin-save-btn{background:#5B6E2E;color:#fff}
.admin-export-btn{background:#E8DCC8;color:#2C3315}
.admin-reset-btn{background:transparent;color:#C4956A;border:1px solid #C4956A!important}
.admin-unclaim-btn{background:transparent;color:#c44;border:1px solid #c44!important;margin-top:8px;padding:8px;width:100%;border-radius:8px;font-size:12px}

.admin-toast{position:fixed;bottom:80px;right:20px;background:#2C3315;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:2000;display:none;animation:fadeUp 0.3s ease}
.admin-toast.show{display:block}

.admin-login-wrap{margin-top:32px;padding-top:16px;border-top:1px solid #F0ECE4}
.admin-login-btn{background:none;border:none;font-size:11px;color:#ccc;letter-spacing:0.04em;transition:color 0.15s}
.admin-login-btn:hover{color:#999}
.admin-pw-form{display:none;margin-top:10px;gap:8px;align-items:center;justify-content:center}
.admin-pw-form.open{display:flex}
.admin-pw-input{font-family:'Outfit',sans-serif;font-size:12px;padding:6px 12px;border:1px solid #E8DCC8;border-radius:6px;outline:none;color:#3D3D3D;width:160px}
.admin-pw-go{font-family:'Outfit',sans-serif;font-size:11px;padding:6px 14px;background:#5B6E2E;color:#fff;border:none;border-radius:6px}
.admin-pw-err{font-size:11px;color:#c44;margin-top:4px;display:none}
.admin-pw-err.show{display:block}

/* Edit modal */
.edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2001;align-items:center;justify-content:center}
.edit-overlay.open{display:flex}
.edit-modal{background:#fff;border-radius:14px;padding:24px;width:400px;max-width:90vw;max-height:85vh;overflow-y:auto}
.edit-modal h3{font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;color:#2C3315;margin-bottom:16px}
.edit-field{margin-bottom:12px}
.edit-field label{display:block;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:4px}
.edit-field input,.edit-field textarea{width:100%;font-family:'Outfit',sans-serif;font-size:13px;padding:8px 12px;border:1px solid #E8DCC8;border-radius:6px;outline:none;color:#3D3D3D}
.edit-field textarea{resize:vertical;min-height:60px}
.edit-btns{display:flex;gap:8px;margin-top:16px}
.edit-btns button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:500;border:none}
.edit-save{background:#5B6E2E;color:#fff}
.edit-cancel{background:transparent;color:#aaa;border:1px solid #ddd!important}

.claim-status{font-size:10px;color:#5B6E2E;background:rgba(91,110,46,0.1);padding:2px 6px;border-radius:4px;margin-left:4px}
</style>
</head>
<body>

<div id="app"></div>

<!-- Admin toggle -->
<button class="admin-toggle" id="adminToggle" onclick="openAdmin()">⚙</button>

<!-- Admin overlay -->
<div class="admin-overlay" id="adminOverlay" onclick="closeAdmin()"></div>

<!-- Admin panel -->
<div class="admin-panel" id="adminPanel">
  <button class="admin-close" onclick="closeAdmin()">✕</button>
  <h2>Registry Admin</h2>
  <p class="admin-sub">Reorder items, edit content, manage claims</p>

  <div class="admin-actions">
    <button class="admin-save-btn" onclick="saveAdminChanges()">💾 Save Changes</button>
    <button class="admin-export-btn" onclick="exportConfig()">📋 Copy Config</button>
    <button class="admin-reset-btn" onclick="resetOrder()">↺ Reset Order</button>
  </div>

  <div class="admin-section">
    <h3>Reorder & Edit Items</h3>
    <button onclick="openAddItem()" style="width:100%;padding:10px;margin-bottom:12px;background:#F8F6F0;border:2px dashed #5B6E2E;border-radius:8px;color:#5B6E2E;font-size:13px;font-weight:600;cursor:pointer;font-family:Outfit,sans-serif">+ Add New Item</button>
    <div class="admin-filter-bar" id="adminFilterBar"></div>
    <div id="adminItemList"></div>
  </div>

  <div class="admin-section">
    <h3>Claims Tally</h3>
    <div id="adminClaimTally"></div>
    <div id="adminClaimList" style="margin-top:12px"></div>
    <button class="admin-unclaim-btn" onclick="clearAllClaims()">Clear All Claims</button>
  </div>
</div>

<!-- Edit modal -->
<div class="edit-overlay" id="editOverlay">
  <div class="edit-modal" id="editModal"></div>
</div>

<!-- Toast -->
<div class="admin-toast" id="adminToast"></div>

const CATS_ALL = [...new Set(DEFAULT_ITEMS.map(i=>i.cat))];

function initItems() {
  const saved = localStorage.getItem("op-reg-overrides");
  if (saved) { try { editOverrides = JSON.parse(saved); } catch(e){} }
  // Load image overrides
  const imgSaved = localStorage.getItem("op-reg-img-overrides");
  if (imgSaved) { try { const io = JSON.parse(imgSaved); Object.assign(IMAGES, io); } catch(e){} }
  // Load link overrides
  const linkSaved = localStorage.getItem("op-reg-link-overrides");
  if (linkSaved) {
    try {
      const lo = JSON.parse(linkSaved);
      Object.keys(lo).forEach(id => {
        const idx = ITEMS.findIndex(i => i.id === id);
        if (idx >= 0) ITEMS[idx].links = lo[id];
      });
    } catch(e){}
  }
  if (CUSTOM_ORDER.length > 0) {
    ITEMS = CUSTOM_ORDER.map(id => DEFAULT_ITEMS.find(i=>i.id===id)).filter(Boolean);
    const remaining = DEFAULT_ITEMS.filter(i => !CUSTOM_ORDER.includes(i.id));
    ITEMS = [...ITEMS, ...remaining];
  } else {
    const savedOrder = localStorage.getItem("op-reg-order");
    if (savedOrder) {
      try {
        const order = JSON.parse(savedOrder);
        ITEMS = order.map(id => DEFAULT_ITEMS.find(i=>i.id===id)).filter(Boolean);
        const remaining = DEFAULT_ITEMS.filter(i => !order.includes(i.id));
        ITEMS = [...ITEMS, ...remaining];
      } catch(e) { ITEMS = [...DEFAULT_ITEMS]; }
    } else {
      ITEMS = [...DEFAULT_ITEMS];
    }
  }
  // Remove deleted default items
  const deletedItems = localStorage.getItem("op-reg-deleted-items");
  if (deletedItems) {
    try {
      const deleted = JSON.parse(deletedItems);
      ITEMS = ITEMS.filter(i => !deleted.includes(i.id));
    } catch(e){}
  }
  // Load user-added items
  const addedItems = localStorage.getItem("op-reg-added-items");
  if (addedItems) {
    try {
      const added = JSON.parse(addedItems);
      added.forEach(item => {
        if (!ITEMS.find(i => i.id === item.id)) {
          ITEMS.push(item);
          if (item.cat && !CATS_ALL.includes(item.cat)) {
            CATS_ALL.push(item.cat);
            CATS_ALL.sort();
          }
        }
      });
    } catch(e){}
  }
  // Apply overrides
  ITEMS = ITEMS.map(item => {
    const ov = editOverrides[item.id];
    return ov ? {...item, ...ov} : item;
  });
}

const CLOUD_API = "https://api.npoint.io/61204cfaecf0ccbbbc93";

// ── Cloud helpers ──
async function cloudGet() {
  try {
    const res = await fetch(CLOUD_API);
    if (res.ok) return await res.json();
  } catch(e) {}
  return null;
}

async function cloudSet(data) {
  try {
    await fetch(CLOUD_API, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

// ── Load everything from cloud on page load ──
async function loadFromCloud() {
  const data = await cloudGet();
  if (data) {
    // Load claims
    claims = data.claims || {};
    // Load config
    const cfg = data.config || {};
    if (cfg.siteText) Object.assign(siteText, cfg.siteText);
    if (cfg.overrides) editOverrides = cfg.overrides;
    if (cfg.imgOverrides) Object.assign(IMAGES, cfg.imgOverrides);
    if (cfg.order && cfg.order.length) {
      ITEMS = cfg.order.map(id => DEFAULT_ITEMS.find(i=>i.id===id)).filter(Boolean);
      const remaining = DEFAULT_ITEMS.filter(i => !cfg.order.includes(i.id));
      ITEMS = [...ITEMS, ...remaining];
    }
    if (cfg.deletedItems && cfg.deletedItems.length) {
      ITEMS = ITEMS.filter(i => !cfg.deletedItems.includes(i.id));
    }
    if (cfg.addedItems && cfg.addedItems.length) {
      cfg.addedItems.forEach(item => {
        if (!ITEMS.find(i => i.id === item.id)) {
          ITEMS.push(item);
          if (item.cat && !CATS_ALL.includes(item.cat)) {
            CATS_ALL.push(item.cat);
            CATS_ALL.sort();
          }
        }
      });
    }
    if (cfg.linkOverrides) {
      Object.keys(cfg.linkOverrides).forEach(id => {
        const idx = ITEMS.findIndex(i => i.id === id);
        if (idx >= 0) ITEMS[idx].links = cfg.linkOverrides[id];
      });
    }
    // Apply text overrides
    ITEMS = ITEMS.map(item => {
      const ov = editOverrides[item.id];
      return ov ? {...item, ...ov} : item;
    });
  }
  render();
  // Auto-refresh every 30s
  setInterval(async () => {
    const fresh = await cloudGet();
    if (!fresh) return;
    const newClaims = fresh.claims || {};
    if (JSON.stringify(newClaims) !== JSON.stringify(claims)) {
      claims = newClaims;
      render();
      if (isAdmin) renderAdminList();
    }
  }, 30000);
}

// ── Build config object from current state ──
function buildConfig() {
  return {
    order: ITEMS.map(i => i.id),
    overrides: editOverrides,
    imgOverrides: JSON.parse(localStorage.getItem("op-reg-img-overrides") || "{}"),
    linkOverrides: JSON.parse(localStorage.getItem("op-reg-link-overrides") || "{}"),
    siteText: siteText,
    addedItems: JSON.parse(localStorage.getItem("op-reg-added-items") || "[]"),
    deletedItems: JSON.parse(localStorage.getItem("op-reg-deleted-items") || "[]")
  };
}

// ── Save claims to cloud (merges with server) ──
async function saveClaims() {
  localStorage.setItem("op-registry-claims", JSON.stringify(claims));
  const data = await cloudGet() || {};
  const serverClaims = data.claims || {};
  const merged = {...serverClaims, ...claims};
  data.claims = merged;
  await cloudSet(data);
  claims = merged;
  render();
}

// ── Save config to cloud (admin only) ──
async function saveConfig() {
  const data = await cloudGet() || {};
  data.config = buildConfig();
  await cloudSet(data);
}

// ── Remove single claim from cloud ──
async function removeClaimFromCloud(itemId) {
  const data = await cloudGet() || {};
  const serverClaims = data.claims || {};
  delete serverClaims[itemId];
  data.claims = serverClaims;
  await cloudSet(data);
  claims = serverClaims;
}

// ── Clear all claims on cloud ──
async function clearAllClaimsOnCloud() {
  const data = await cloudGet() || {};
  data.claims = {};
  await cloudSet(data);
}

function moveItem(itemId, direction) {
  // Move within context (all items or filtered category)
  if (adminCat === "All") {
    const idx = ITEMS.findIndex(i => i.id === itemId);
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= ITEMS.length) return;
    [ITEMS[idx], ITEMS[newIdx]] = [ITEMS[newIdx], ITEMS[idx]];
  } else {
    const catItems = ITEMS.filter(i => i.cat === adminCat);
    const catIdx = catItems.findIndex(i => i.id === itemId);
    const newCatIdx = catIdx + direction;
    if (newCatIdx < 0 || newCatIdx >= catItems.length) return;
    const globalIdx1 = ITEMS.findIndex(i => i.id === catItems[catIdx].id);
    const globalIdx2 = ITEMS.findIndex(i => i.id === catItems[newCatIdx].id);
    [ITEMS[globalIdx1], ITEMS[globalIdx2]] = [ITEMS[globalIdx2], ITEMS[globalIdx1]];
  }
  renderAdminList();
  render();
}

window._pendingImg = null;

function handleImgUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    // Resize to max 300px wide for storage efficiency
    const img = new Image();
    img.onload = function() {
      const maxW = 300;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
      window._pendingImg = dataUrl;
      const preview = document.getElementById("ed-img-preview");
      if (preview) {
        if (preview.tagName === "IMG") { preview.src = dataUrl; }
        else { preview.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:contain;border-radius:6px">`; }
      }
      const status = document.getElementById("ed-img-status");
      if (status) { status.textContent = file.name; status.style.color = "#5B6E2E"; }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

            Choose Image…
            <input type="file" id="ed-img-file" accept="image/*" style="display:none" onchange="handleImgUpload(this)">

          <span id="ed-img-status" style="font-size:11px;color:#999;margin-left:8px">No file selected</span>

    </div>
    <div class="edit-field">
      <label>Category</label>
      <input id="ed-cat" value="" placeholder="e.g. Kitchen" list="cat-suggestions">

    </div>
    <div class="edit-field">
      <label style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="ed-group"> Group Gift Idea (for expensive items)
      </label>
    </div>
    <div class="edit-field">
      <label>Product Links</label>
      <div id="ed-links-list" style="margin-top:6px">${renderEditLinks()}</div>
      <button onclick="addEditLink()" style="margin-top:6px;font-size:12px;padding:6px 12px;background:#F8F6F0;border:1px dashed #5B6E2E;border-radius:6px;color:#5B6E2E;cursor:pointer;font-weight:500">+ Add Link</button>
    </div>
    <div class="edit-btns">
      <button class="edit-save" onclick="saveNewItem()">Add Item</button>
      <button class="edit-cancel" onclick="closeEdit()">Cancel</button>
    </div>
  `;
  document.getElementById("editOverlay").classList.add("open");
}

function saveNewItem() {
  const name = document.getElementById("ed-name").value.trim();
  if (!name) {
    document.getElementById("ed-name").style.borderColor = "#c44";
    document.getElementById("ed-name").focus();
    return;
  }
  // Generate ID from name
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/-+$/,"") + "-" + Date.now().toString(36);

  syncEditLinksFromDOM();
  const cleanLinks = window._editLinks.filter(lk => lk.u && lk.u.trim());

  const newItem = {
    id: id,
    name: name,
    cat: document.getElementById("ed-cat").value.trim() || "Other",
    desc: document.getElementById("ed-desc").value.trim() || "",
    opts: document.getElementById("ed-opts").value.trim() || "",
    price: document.getElementById("ed-price").value.trim() || "",
    group: document.getElementById("ed-group").checked,
    links: cleanLinks
  };

  // Handle photo
  if (window._pendingImg) {
    IMAGES[id] = window._pendingImg;
    const imgOverrides = JSON.parse(localStorage.getItem("op-reg-img-overrides") || "{}");
    imgOverrides[id] = window._pendingImg;
    localStorage.setItem("op-reg-img-overrides", JSON.stringify(imgOverrides));
    window._pendingImg = null;
  } else {
    // Placeholder image
    IMAGES[id] = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiB2aWV3Qm94PSIwIDAgMjAwIDIwMCI+PHJlY3QgZmlsbD0iI0Y4RjZGMiIgd2lkdGg9IjIwMCIgaGVpZ2h0PSIyMDAiLz48cmVjdCB4PSI3MCIgeT0iNjAiIHdpZHRoPSI2MCIgaGVpZ2h0PSI4MCIgcng9IjQiIGZpbGw9IiNFOERDQzgiLz48cmVjdCB4PSI2MCIgeT0iODUiIHdpZHRoPSI4MCIgaGVpZ2h0PSI4IiByeD0iNCIgZmlsbD0iI0M0OTU2QSIvPjxyZWN0IHg9Ijk1IiB5PSI2MCIgd2lkdGg9IjgiIGhlaWdodD0iODAiIHJ4PSI0IiBmaWxsPSIjQzQ5NTZBIi8+PHBhdGggZD0iTTcwIDYwIFE4MCA0MCAxMDAgNjAiIHN0cm9rZT0iI0M0OTU2QSIgc3Ryb2tlLXdpZHRoPSIzIiBmaWxsPSJub25lIi8+PHBhdGggZD0iTTEzMCA2MCBRMTIwIDQwIDEwMCA2MCIgc3Ryb2tlPSIjQzQ5NTZBIiBzdHJva2Utd2lkdGg9IjMiIGZpbGw9Im5vbmUiLz48L3N2Zz4=";
  }

  // Save link overrides
  if (cleanLinks.length) {
    const linkOverrides = JSON.parse(localStorage.getItem("op-reg-link-overrides") || "{}");
    linkOverrides[id] = cleanLinks;
    localStorage.setItem("op-reg-link-overrides", JSON.stringify(linkOverrides));
  }

  // Add to items list
  ITEMS.push(newItem);

  // Persist new items to localStorage
  const addedItems = JSON.parse(localStorage.getItem("op-reg-added-items") || "[]");
  addedItems.push(newItem);
  localStorage.setItem("op-reg-added-items", JSON.stringify(addedItems));

  // Update categories
  if (newItem.cat && !CATS_ALL.includes(newItem.cat)) {
    CATS_ALL.push(newItem.cat);
    CATS_ALL.sort();
  }

  closeEdit();
  renderAdminList();
  render();
  saveConfig();
  showToast("\"" + name + "\" added to registry!");
}

function deleteItem(itemId) {
  const item = ITEMS.find(i => i.id === itemId);
  if (!item) return;
  if (!confirm(`Delete "${item.name}" from the registry?`)) return;

  // Remove from ITEMS array
  ITEMS = ITEMS.filter(i => i.id !== itemId);

  // Remove from added items if it was user-added
  const addedItems = JSON.parse(localStorage.getItem("op-reg-added-items") || "[]");
  const filtered = addedItems.filter(i => i.id !== itemId);
  localStorage.setItem("op-reg-added-items", JSON.stringify(filtered));

  // Track deleted default items
  const isDefault = DEFAULT_ITEMS.find(i => i.id === itemId);
  if (isDefault) {
    const deleted = JSON.parse(localStorage.getItem("op-reg-deleted-items") || "[]");
    if (!deleted.includes(itemId)) deleted.push(itemId);
    localStorage.setItem("op-reg-deleted-items", JSON.stringify(deleted));
  }

  // Clean up related data
  delete claims[itemId];
  localStorage.setItem("op-registry-claims", JSON.stringify(claims));
  removeClaimFromCloud(itemId);
  delete editOverrides[itemId];
  localStorage.setItem("op-reg-overrides", JSON.stringify(editOverrides));

  renderAdminList();
  render();
  saveConfig();
  showToast(`"${item.name}" removed`);
}

function saveAdminChanges() {
  localStorage.setItem("op-reg-order", JSON.stringify(ITEMS.map(i=>i.id)));
  localStorage.setItem("op-reg-overrides", JSON.stringify(editOverrides));
  saveConfig();
  showToast("Changes saved & synced!");
}

function exportConfig() {
  const order = ITEMS.map(i => `"${i.id}"`).join(",");
  const line = `const CUSTOM_ORDER = [${order}];`;
  navigator.clipboard.writeText(line).then(() => {
    showToast("Order config copied! Paste it into the HTML on GitHub.");
  }).catch(() => {
    prompt("Copy this line and replace CUSTOM_ORDER in the HTML:", line);
  });
}

function resetOrder() {
  if (!confirm("Reset ALL admin changes? This will remove added items and restore defaults.")) return;
  localStorage.removeItem("op-reg-order");
  localStorage.removeItem("op-reg-overrides");
  localStorage.removeItem("op-reg-img-overrides");
  localStorage.removeItem("op-reg-link-overrides");
  localStorage.removeItem("op-reg-site-text");
  localStorage.removeItem("op-reg-added-items");
  localStorage.removeItem("op-reg-deleted-items");
  editOverrides = {};
  siteText = {...SITE_TEXT_DEFAULTS};
  ITEMS = [...DEFAULT_ITEMS];
  renderAdminList();
  render();
  saveConfig();
  showToast("Order reset to default");
}

function removeClaim(itemId) {
  delete claims[itemId];
  localStorage.setItem("op-registry-claims", JSON.stringify(claims));
  removeClaimFromCloud(itemId);
  renderAdminList();
  render();
  showToast("Claim removed");
}

function clearAllClaims() {
  if (!confirm("Remove ALL guest claims? This cannot be undone.")) return;
  claims = {};
  localStorage.setItem("op-registry-claims", JSON.stringify(claims));
  clearAllClaimsOnCloud();
  renderAdminList();
  render();
  showToast("All claims cleared");
}

function renderAdminList() {
  // Filter bar
  const fb = document.getElementById("adminFilterBar");
  fb.innerHTML = ["All",...CATS_ALL].map(c =>
    `<button class="${adminCat===c?"on":""}" onclick="adminCat='${c}';renderAdminList()">${c}</button>`
  ).join("");

  // Item list
  const filtered = getFilteredAdminItems();
  const il = document.getElementById("adminItemList");
  il.innerHTML = filtered.map((item, idx) => {
    const claimed = claims[item.id];
    return `
    <div class="admin-item">
      <img src="${IMAGES[item.id]}" alt="">
      <div class="admin-item-info">
        <div class="admin-item-name">${item.name} ${claimed?`<span class="claim-status">✓ ${claimed.name}</span>`:""}</div>
        <div class="admin-item-cat">${item.cat} · ${item.price}</div>
      </div>
      <button class="admin-edit-btn" onclick="openEdit('${item.id}')">Edit</button>
      <button class="admin-edit-btn" style="color:#c44;border-color:#c44" onclick="deleteItem('${item.id}')" title="Delete item">✕</button>
      <div class="admin-arrows">
        <button ${idx===0?"disabled":""} onclick="moveItem('${item.id}',-1)">▲</button>
        <button ${idx===filtered.length-1?"disabled":""} onclick="moveItem('${item.id}',1)">▼</button>
      </div>
    </div>`;
  }).join("");

  // Claims tally - group by person
  const tally = document.getElementById("adminClaimTally");
  const claimedItems = ITEMS.filter(i => claims[i.id]);
  const byPerson = {};
  claimedItems.forEach(item => {
    const c = claims[item.id];
    if (!byPerson[c.name]) byPerson[c.name] = [];
    byPerson[c.name].push(item);
  });
  const personNames = Object.keys(byPerson).sort();
  if (personNames.length === 0) {
    tally.innerHTML = '<p style="font-size:13px;color:#aaa;padding:8px 0">No claims yet</p>';
  } else {
    tally.innerHTML = `
      <div style="background:#F8F6F0;border-radius:10px;padding:14px;border:1px solid #EDE8DF">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:12px;font-weight:600;color:#2C3315">${claimedItems.length} of ${ITEMS.length} gifts claimed</span>
          <span style="font-size:12px;color:#999">${personNames.length} guest${personNames.length!==1?"s":""}</span>
        </div>
        ${personNames.map(name => {
          const items = byPerson[name];
          return `<div style="margin-bottom:8px;padding:8px 10px;background:#fff;border-radius:6px;border:1px solid #EDE8DF">
            <div style="font-size:13px;font-weight:500;color:#2C3315;margin-bottom:4px">${name} <span style="font-size:10px;color:#999;font-weight:400">(${items.length} item${items.length!==1?"s":""})</span></div>
            ${items.map(item => `<div style="font-size:11px;color:#777;padding:2px 0;display:flex;justify-content:space-between;align-items:center">
              <span>• ${item.name} <span style="color:#bbb">${item.price}</span></span>
              <button onclick="removeClaim('${item.id}')" style="background:none;border:none;font-size:10px;color:#c44;cursor:pointer;padding:2px 4px">✕</button>
            </div>`).join("")}
          </div>`;
        }).join("")}
      </div>
    `;
  }

  // Individual claims list
  const cl = document.getElementById("adminClaimList");
  if (claimedItems.length === 0) {
    cl.innerHTML = '';
  } else {
    cl.innerHTML = claimedItems.map(item => {
      const c = claims[item.id];
      return `<div class="admin-item">
        <div class="admin-item-info">
          <div class="admin-item-name">${item.name}</div>
          <div class="admin-item-cat">Claimed by <strong>${c.name}</strong> on ${new Date(c.date).toLocaleDateString()}</div>
        </div>
        <button class="admin-edit-btn" style="color:#c44;border-color:#c44" onclick="removeClaim('${item.id}')">Remove</button>
      </div>`;
    }).join("");
  }
}

  </div>
  <nav class="filters">

      return `

        <div class="card-cat">${item.cat}</div>
        <h3 class="card-name">${isAdmin

        }</h3>
        <p class="card-desc" ${ce} ${isAdmin?`onblur="onCardTextBlur('${item.id}','desc',this)"`:''}>${item.desc}</p>
        <div class="meta">
          <div class="meta-row"><span class="meta-k">We'd love</span><span class="meta-v" ${ce} ${isAdmin?`onblur="onCardTextBlur('${item.id}','opts',this)"`:''}>${item.opts}</span></div>
          <div class="meta-row"><span class="meta-k">Price</span><span class="meta-p" ${ce} ${isAdmin?`onblur="onCardTextBlur('${item.id}','price',this)"`:''}>${item.price}</span></div>

        <div class="links-area">

          <div id="links-${item.id}" class="links-list">
            ${item.links.map(lnk => `<a class="link-row" href="${lnk.u}" target="_blank" rel="noopener noreferrer"><span>${lnk.l}</span><span class="link-go">↗</span></a>`).join("")}

        ${claimed ? `
